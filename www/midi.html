<!DOCTYPE html>
<html>
<head>
    <title>MIDI songs</title>
	<link rel="stylesheet" href="style.css" />
	<script src="script.js"></script>
</head>
<body>
    <h1>MIDI Note Listener</h1>
    <div id="status"></div>

    <script>
        if (navigator.requestMIDIAccess) {
            navigator.requestMIDIAccess()
                .then(onMIDISuccess, onMIDIFailure);
        } else {
            document.getElementById('status').innerHTML = 
                "Web MIDI API is not supported in this browser.";
        }

        function onMIDISuccess(midi) {
            document.getElementById('status').innerHTML = "MIDI Connected!";
            
            // Listen for MIDI devices when they change
            midi.addEventListener('statechange', (event) => {
                console.log('MIDI device state changed', event);
            });

            // Set up input listeners
            for (let input of midi.inputs.values()) {
                if (input.name === "Ovládač IAC Zbernica 1") {
                    input.addEventListener('midimessage', handleMIDIMessage);
                }
            }
        }

        function onMIDIFailure(error) {
            document.getElementById('status').innerHTML = 
                "Failed to access MIDI devices: " + error;
        }

        let songindex = 0;
        let verseindex = 0;
        let data = await GET('/lists/newlevel.readonly.txt');
        let songs = data.split('\n')
        function handleMIDIMessage(message) {
            const [status, note, velocity] = message.data;
            
            // MIDI note-on message (status byte 144-159, where 144 = channel 1)
            if ((status & 0xF0) === 0x90 && velocity > 0) {
                if (note === 17) {}
                if ([17, 18, 19].includes(note)) {
                    console.log(`Note ${note} velocity: ${velocity}`);
                }
            }
        }
    </script>
</body>
</html>
