<!DOCTYPE html>
<head>
	<title>Main bible</title>
	<style>
		body {
			margin: 0;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			background-color: #000;
			color: #fff;
			font-family: Arial, sans-serif;
		}

		#currentVerse {
			font-size: 5vw;
			text-align: center;
			white-space: pre;
		}

		h1,
		h2,
		blockquote,
		sup {
			display: none;
		}
	</style>
	<script src="script.js"></script>
</head>

<body>
	<section>
		<div id="currentVerse"></div>
	</section>
	<script>
		const currentVerseElement = document.getElementById("currentVerse");
		connectToFileWebSocket("/var/bible/state/nlpp-line1.txt", data => {
			currentVerseElement.innerHTML = data;
		});
		connectToFileWebSocket("/var/bible/state/nlpp-show.txt", data => {
			currentVerseElement.style.display = data === 'true' ? "block" : "none";
		});
		setInterval(updateTimers, 1000);
	</script>
</body>
