<!DOCTYPE html>
<head>
    <title>Songs</title>
    <link rel="stylesheet" href="../style.css" />
    <script src="../script.js"></script>
</head>
<body>
<section class="toolbar">
    <select id="folders" onchange="onchangeFolder()"></select>
</section>
<ul id="songs"></ul>
<section id="controls">
    <input type="text" id="filterInput" placeholder="Filter" oninput="filterSongs()" />
    <input type="checkbox" id="searchContent" onchange="filterSongs()" title="Search in content" />
</section>
<script>
    const foldersNode = document.getElementById("folders");
    const songsNode = document.getElementById("songs");
    const filterInput = document.getElementById("filterInput");
    const searchContent = document.getElementById("searchContent");
    const normalizedSongs = {};
    const collator = new Intl.Collator(undefined, {numeric: true, sensitivity: 'base'});
    let folders = [""];
    let currentFolder = "";
    let currentListData = [];

    async function fetchSongs() {
        folders.splice(1); // remove all except empty prefix
        let songFiles = await fetchDirRecursive('/songs/');
        songFiles.sort(collator.compare);
        renderSongList(songFiles);
        renderFolders(folders);
    }
    
    function renderFolders(folders) {
        foldersNode.innerHTML = "";
        console.log('folders', folders)
        for (let folder of folders) {
            const option = document.createElement("option");
            option.value = folder;
            option.textContent = folder.substr(0, folder.length-1);
            foldersNode.appendChild(option);
        }
    }
    
    function renderSongList(songPaths) {
        songsNode.innerHTML = "";
        songPaths.forEach(songPath => {
            const li = document.createElement("li");
            li.dataset.path = songPath;
            const div = document.createElement("div");
            dir = songPath.replace(/(^|\/)[^\/]+$/, ""); // remove filename
            if (dir) {
                const dirspan = document.createElement("span");
                dirspan.className = "dir";
                dirspan.textContent = dir;
                div.appendChild(dirspan);
            }
            const span = document.createElement("span");
            span.textContent = songPath.replaceAll(/^.+\/|\.[^/.]+$/g, ""); // remove dir and extension
            div.appendChild(span);
            li.appendChild(div);
            li.onclick = () => onclickSong(songPath);
            appendButton(li, "✎", (e) => { e.stopPropagation(); edit(songPath); });
            songsNode.appendChild(li);
        });
        filterSongs();
    }

    async function filterSongs() {
        const query = normalizeText(filterInput.value);
        for (const li of songsNode.children) {
            li.style.display = normalizeText(li.textContent).includes(query) && li.dataset.path.startsWith(currentFolder) ? "" : "none";
        }
        if (searchContent.checked) {
            for (const li of songsNode.children) {
                const content = await getCachedSong(li.dataset.path)
                if (content.includes(query) && li.style.display == "none") {
                    li.style.display = "";
                }
            }
        }
    }
    
    function onchangeFolder() {
        currentFolder = foldersNode.value;
        filterSongs();
    }

    async function getCachedSong(songFile) {
        let content = normalizedSongs[songFile];
        if (content === undefined) {
            content = await GET(`/songs/${encodeURIComponent(songFile)}`);
            normalizedSongs[songFile] = normalizeText(content);
        }
        return content;
    }

    async function onclickSong(songPath) {
        await PUT('/var/song/path.txt', songPath);
        // Add to current list
        const listData = await GET(`/var/list/current.txt`);
        const lines = listData.trim() ? listData.trim().split("\n") : [];
        if (!lines.includes(songPath)) {
            lines.push(songPath);
            await PUT('/var/list/current.txt', lines.join("\n"));
            currentListData = lines;
        } else {
            currentListData = lines;
        }
        refreshRemoveButtons();
    }
    
    function edit(songFile) {
        window.open('editor.html#'+songFile, '_blank');
    }

    fetchSongs();
    connectToFileWebSocket("/var/list/current.txt", async (data) => {
        currentListData = data.trim() ? data.trim().split("\n") : [];
        refreshRemoveButtons();
    });

    function refreshRemoveButtons() {
        for (const li of songsNode.children) {
            const btn = li.querySelector(".remove-btn");
            if (btn) btn.remove();
            if (currentListData.includes(li.dataset.path)) {
                appendButton(li, "×", async (e) => {
                    e.stopPropagation();
                    currentListData = currentListData.filter(p => p !== li.dataset.path);
                    await PUT('/var/list/current.txt', currentListData.join("\n"));
                    refreshRemoveButtons();
                }, "remove-btn");
            }
        }
    }
</script>
</body>
