<!DOCTYPE html>
<head>
	<title>Editor</title>
	<link rel="stylesheet" href="../style.css" />
	<script src="../script.js"></script>
	<style>
		.raw .toolbar,
		.raw #versesList {
			display: none;
		}
		#versesList {
			padding: 3rem 0;
		}
		#divRaw {
			display: none;
			white-space: pre;
			padding: 1rem 1rem 4rem;
			min-height: 100vh;
		}
		.raw #divRaw {
			display: block;
		}
		#controls select {
			font: inherit;
			padding: .15rem;
		}
	</style>
</head>

<body>
	<section class="toolbar">
		<button onclick="formatText('b')">b</button>
		<button onclick="formatText('i')">i</button>
		<button onclick="formatText('s')">s</button>
		<button onclick="formatText('u')">u</button>
		<button onclick="formatText('h1')">h1</button>
		<button onclick="formatText('h2')">h2</button>
		<button onclick="formatText('sup')">sup</button>
		<button onclick="formatText('sub')">sub</button>
	</section>
	<ol id="versesList"></ol>
	<div id="divRaw" contenteditable="true"></div>
	<section id="controls">
		<button id="save" title="Save" onclick="save()"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 -960 960 960"><path d="M840-680v480q0 33-23 57t-57 23H200q-33 0-56-23t-24-57v-560q0-33 24-56t56-24h480l160 160Zm-80 34L646-760H200v560h560v-446ZM480-240q50 0 85-35t35-85q0-50-35-85t-85-35q-50 0-85 35t-35 85q0 50 35 85t85 35ZM240-560h360v-160H240v160Zm-40-86v446-560 114Z"/></svg></button>
		<button id="raw" title="Raw" onclick="toggleRaw()"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 -960 960 960"><path d="M320-240 80-480l240-240 57 57-184 184 183 183-56 56Zm320 0-57-57 184-184-183-183 56-56 240 240-240 240Z"/></svg></button>
		<select id="saveAs" title="Save a copy as…" onchange="saveAsCopy()">
			<option value="">Save as…</option>
			<option value="text">Lenverse text (.txt)</option>
			<option value="markdown">Markdown (.md)</option>
			<option value="openlyrics">OpenLyrics (.xml)</option>
			<option value="opensong">OpenSong (.xml)</option>
			<option value="propresenter">ProPresenter (.json)</option>
		</select>
	</section>

	<script>
		const versesListElement = document.getElementById("versesList");
		const divRaw = document.getElementById("divRaw");
		const filename = decodeURIComponent(window.location.hash.slice(1));
		if (!filename) {
			document.body.textContent = "No file specified. Use editor.html#filename";
		}
		let verses = [];
		let raw = '';
		let sourceRaw = '';

		async function renderVerses() {
			verses = await parseSong(filename, raw) || [];
			raw = verses.join('\n\n');
			versesListElement.innerHTML = "";
			verses.forEach((verse, i) => {
				const listItem = document.createElement("li");
				listItem.innerHTML = verse;
				listItem.contentEditable = true;
				versesListElement.appendChild(listItem);
			});
		}
		
		function getRaw() {
			if (document.body.classList.contains('raw'))
				return divRaw.innerText;
			verses = [];
			for (let li of versesListElement.children) {
				verses.push(li.innerHTML)
			}
			return verses.join('\n\n');
		}
		
		function toggleRaw() {
			raw = getRaw();
			if (document.body.classList.contains('raw')) {
				renderVerses();
			} else {
				divRaw.innerText = raw;
			}
			document.body.classList.toggle('raw');
		}
		
		async function save() {
			const content = getRaw();
			await PUT(`/songs/${encodeURIComponent(filename)}`, content);
			console.log('Saved', filename);
		}

		let _fmt;
		function formatModule() { return (_fmt ||= import('../format.mjs')); }

		const SAVE_AS_EXT = { text: 'txt', markdown: 'md', openlyrics: 'xml', opensong: 'xml', propresenter: 'json' };

		// Turn rendered `<sup>C</sup>` back into lenverse `[C]` chord notation.
		function supToChords(html) { return html.replace(/<sup\b[^>]*>([\s\S]*?)<\/sup>/gi, '[$1]'); }
		function htmlLineToText(html) { return supToChords(html).replace(/<br\s*\/?>/gi, '\n'); }

		// Rebuild a song model from the contentEditable verses so "Save as…"
		// reflects the user's edits, not just the originally loaded source.
		function modelFromEditor() {
			const sections = [];
			for (const li of versesListElement.children) {
				const h1 = li.querySelector(':scope > h1');
				const bq = li.querySelector(':scope > blockquote');
				const name = h1 ? h1.textContent.trim() : '';
				const note = bq ? bq.textContent.trim() : '';
				const ps = Array.from(li.querySelectorAll(':scope > p'));
				let body;
				if (ps.length) {
					body = ps.map(p => htmlLineToText(p.innerHTML)).join('\n');
				} else {
					const clone = li.cloneNode(true);
					const h = clone.querySelector(':scope > h1'); if (h) h.remove();
					const b = clone.querySelector(':scope > blockquote'); if (b) b.remove();
					body = htmlLineToText(clone.innerHTML);
				}
				body = body.split('\n').map(l => l.trim()).filter(l => l.length).join('\n');
				if (body || name) sections.push({ name, body, note: note || undefined });
			}
			return { sections };
		}

		// Save a non-destructive copy of the current song in another format,
		// written next to the original, then open the copy.
		async function saveAsCopy() {
			const sel = document.getElementById('saveAs');
			const fmt = sel.value;
			sel.value = '';
			if (!fmt) return;
			const f = await formatModule();
			const out = f.writeSong(modelFromEditor(), fmt);
			const base = filename.replace(/\.[^.\/]+$/, '');
			const outPath = `${base}.${SAVE_AS_EXT[fmt]}`;
			await PUT(`/songs/${encodeURIComponent(outPath)}`, out);
			console.log('Saved copy as', fmt, '→', outPath);
			if (outPath !== filename) { location.hash = encodeURIComponent(outPath); location.reload(); }
		}

		async function load() {
			if (!filename) return;
			sourceRaw = await GET(`/songs/${encodeURIComponent(filename)}`) || '';
			raw = sourceRaw;
			await renderVerses();
		}

		load();
	</script>
</body>
